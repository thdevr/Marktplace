{% extends 'base.html' %}
{% load static %}

{% block content %}


<style>
    .detalhe-container {
        max-width: 700px;
        margin: 60px auto;
        padding: 30px;
        background: #1e293b;
        border-radius: 15px;
        box-shadow: 0 0 25px rgba(59,130,246,0.2);
        color: white;
    }

    .detalhe-container img {
        width: 100%;
        max-height: 600px;
        object-fit: cover;
        border-radius: 12px;
        margin-bottom: 25px;
    }

    .detalhe-container h2 {
        margin-bottom: 15px;
        color: white;
        text-align: center;
    }

    .detalhe-container p {
        margin: 8px 0;
        color: #e5e7eb;
        font-size: 16px;
    }

    .detalhe-container strong {
        color: white;
    }

    .btn-whatsapp {
        display: inline-block;
        margin-top: 20px;
        padding: 10px 18px;
        background-color: #25D366;
        color: white;
        text-decoration: none;
        border-radius: 8px;
        font-weight: bold;
        transition: 0.3s;
    }

    .btn-whatsapp:hover {
        background-color: #1ebe57;
    }
</style>

<div class="detalhe-container">
    <h2>{{ produto.nome }}</h2>

    {% if produto.imagem %}
        <img src="{{ produto.imagem.url }}">
    {% endif %}

    <p><strong>Preço:</strong> R$ {{ produto.preco }}</p>
    <p><strong>Descrição:</strong> {{ produto.descricao }}</p>
    <p><strong>Categoria:</strong> {{ produto.categoria.nome }}</p>

    <a href="https://wa.me/{{ produto.vendedor.telefone }}" class="btn-whatsapp">
        Falar no WhatsApp
    </a>
</div>

{% endblock %}
